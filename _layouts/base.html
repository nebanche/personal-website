<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | escape }} · {{ site.title | escape }}</title>
  {% seo %}
  <link rel="preload" href="{{ '/assets/css/site.css' | relative_url }}" as="style">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <a class="u-skip" href="#main">Skip to content</a>
  {% include header.html %}
  <main id="main" class="o-container o-stack">
    {{ content }}
  </main>
  {% include footer.html %}
  <script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
