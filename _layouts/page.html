---
layout: base
---
<article class="c-article o-stack">
  <header class="c-article__header o-stack">
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="c-article__desc">{{ page.description }}</p>{% endif %}
  </header>
  <div class="c-article__body o-stack">
    {{ content }}
  </div>
</article>
