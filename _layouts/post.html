---
layout: base
---
<article class="c-article o-stack">
  <header class="c-article__header o-stack">
    <h1>{{ page.title }}</h1>
    <p class="c-article__meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
  </header>
  <div class="c-article__body o-stack">
    {{ content }}
  </div>
</article>
