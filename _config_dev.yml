# Development configuration for local testing
# This extends the main _config.yml but removes the baseurl
# to make local development and testing easier

# Use this configuration with: bundle exec jekyll serve --config _config.yml,_config_dev.yml
# or for building: bundle exec jekyll build --config _config.yml,_config_dev.yml

# Override the baseurl for local development
baseurl: ""

# Optional: Set a different URL for local development
url: "http://localhost:4000"
